plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "pkg/**/*"
    - "tmp/**/*"
    - "examples/**/*"
    - "scripts/**/*"

# ---- Layout ----------------------------------------------------------------
Layout/LineLength:
  Max: 100
  AllowedPatterns:
    - "^\\s*#" # never split a doc comment to satisfy the linter

# ---- Style -----------------------------------------------------------------
Style/StringLiterals:
  EnforcedStyle: double_quotes
Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
Style/Documentation:
  # Every public class carries a YARD comment; a few internal helpers do not
  # need a class banner.
  Enabled: true
Style/TrailingCommaInArguments:
  EnforcedStyleForMultiline: comma
Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma
Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

# ---- Metrics ---------------------------------------------------------------
# An SDK is a broad, flat transcription of a wire contract: many resource
# methods, a transport with a real retry loop, doc-comment-heavy files. Keep
# the metrics honest but do not let them fight a faithful port.
Metrics/MethodLength:
  Max: 40
Metrics/AbcSize:
  Max: 40
Metrics/ClassLength:
  Max: 400
Metrics/ModuleLength:
  Max: 400
  Exclude:
    - "spec/**/*"
Metrics/CyclomaticComplexity:
  Max: 15
Metrics/PerceivedComplexity:
  Max: 15
Metrics/ParameterLists:
  Max: 6
  CountKeywordArgs: false
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "Rakefile"
    - "*.gemspec"

# ---- Lint ------------------------------------------------------------------
Lint/UnusedMethodArgument:
  # Keyword args often document a duck-typed interface (e.g. a connection's
  # `execute(method:, url:, headers:, body:, timeout:)`) even when one impl
  # ignores some of them.
  AllowUnusedKeywordArguments: true

# ---- Naming ----------------------------------------------------------------
Naming/MethodParameterName:
  # `id`, `to`, `t` (webhook timestamp) are the wire's own names.
  AllowedNames:
    - id
    - to
    - t
Naming/PredicatePrefix:
  # `has_more?` mirrors the wire's `hasMore`; `has_next_page?` reads naturally.
  AllowedMethods:
    - has_more?
    - has_next_page?

# ---- RSpec -----------------------------------------------------------------
RSpec/ExampleLength:
  Max: 30
RSpec/MultipleExpectations:
  Max: 12
RSpec/MultipleMemoizedHelpers:
  Max: 12
RSpec/NestedGroups:
  Max: 4
RSpec/MessageSpies:
  Enabled: false
RSpec/StubbedMock:
  Enabled: false
RSpec/SpecFilePathFormat:
  # Specs are organized by phase/topic (unit/, conformance/, integration/),
  # not mirrored one-file-per-class.
  Enabled: false
# The env-gated integration suite drives a real API: expensive shared setup in
# before(:all) with @ivars, and load-time locals for `if:` metadata, are correct
# there.
RSpec/InstanceVariable:
  Exclude:
    - "spec/integration/**/*"
RSpec/BeforeAfterAll:
  Exclude:
    - "spec/integration/**/*"
RSpec/LeakyLocalVariable:
  Exclude:
    - "spec/integration/**/*"
RSpec/ExpectActual:
  # `expect(%w[…]).to include(actual)` is a clear membership check when the
  # acceptable set is the literal and the dynamic value is the actual.
  Exclude:
    - "spec/integration/**/*"
RSpec/DescribeClass:
  Enabled: false
RSpec/ContextWording:
  Enabled: false
