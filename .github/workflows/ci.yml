name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "Ruby ${{ matrix.ruby }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4", "4.0"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Lint (RuboCop)
        run: bundle exec rubocop --format github
      - name: Type signatures (RBS validate)
        run: bundle exec rbs -I sig validate
      - name: Unit + conformance tests
        run: bundle exec rspec spec/unit spec/conformance
      - name: Build the gem (package check)
        run: gem build nombaone.gemspec

  install-check:
    name: "Install the built gem"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build and install into a clean environment
        run: |
          gem build nombaone.gemspec
          gem install ./nombaone-*.gem
          ruby -e "require 'nombaone'; puts Nombaone::VERSION"
